<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <title>Login & Registration</title>
    <style>
        .main-wrapper { display: flex; justify-content: center; gap: 50px; margin-top: 50px; }
        .form-container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="form-container">
            <h2>Кирүү</h2>
            <input type="text" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Сырсөз">
            <button onclick="login()">Кирүү</button>
        </div>

        <div class="form-container">
            <h2>Катталуу</h2>
            <input type="text" id="reg-name" placeholder="Атыңыз">
            <input type="text" id="reg-email" placeholder="Email">
            <input type="password" id="reg-password" placeholder="Сырсөз">
            <button onclick="register()">Катталуу</button>
        </div>
    </div>

    <script>
        // Катталган маалыматтарды сактоочу өзгөрмөлөр
        let savedEmail = "";
        let savedPassword = "";

        function register() {
            let email = document.getElementById('reg-email').value;
            let password = document.getElementById('reg-password').value;
            
            if (email && password) {
                savedEmail = email;
                savedPassword = password;
                alert("Каттоо ийгиликтүү! Эми кире аласыз.");
            } else {
                alert("Бардык талааларды толтуруңуз!");
            }
        }

        function login() {
            let email = document.getElementById('login-email').value;
            let password = document.getElementById('login-password').value;
            
            // Текшерүү: маалыматтар туурабы?
            if (email === savedEmail && password === savedPassword && email !== "") {
                alert("Ийгиликтүү кирдиңиз!");
            } else {
                alert("Ката: Электрондук почта же сырсөз туура эмес!");
            }
        }
    </script>
</body>
</html>
